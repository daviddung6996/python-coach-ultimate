      task: "Nhận danh sách 50 dòng dữ liệu đơn hàng, tìm dòng lỗi (thiếu tên, số âm, email sai format), in danh sách dòng lỗi kèm lý do."
      input_sample: "Nguyen Van A|500000|a@gmail.com\n|300000|b@gmail.com\nTran B|-100000|c@yahoo.com\nLe C|200000|invalid_email"
      expected_output: "DÒNG LỖI:\n- Dòng 2: thiếu tên khách\n- Dòng 3: số tiền âm (-100000)\n- Dòng 4: email không hợp lệ (invalid_email)\n\nTổng: 3/4 dòng lỗi"
      deliverable: "find_invalid_rows.py"
      delivery_package: ["find_invalid_rows.py", "sample_orders.txt", "README.md"]
      market_note: "Tìm dòng lỗi trong data — task cực phổ biến khi nhận file bẩn từ khách, giá 300k-500k."
