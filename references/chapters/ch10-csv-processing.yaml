      enabled: true
      task: "Nhận file dirty_customers.csv (50 dòng, có trùng email, tên bẩn, phone sai format), clean và ghi ra cleaned_customers.csv với summary."
      input_sample: "name,email,phone\n Nguyen Van A ,a@gmail.com,0901234567\nTRAN THI B,b@gmail.com,+849****4568\n nguyen van a ,a@gmail.com,0901234567\nLe Van C,invalid_email,abc"
