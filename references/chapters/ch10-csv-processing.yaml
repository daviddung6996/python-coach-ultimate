- id: 10
  title: CSV & Data Processing
  description: "Đọc, ghi, clean CSV — kỹ năng gần tiền nhất cho beginner Python."
  lessons:
  - id: 39
    title: Reading CSV Files
    objective: "Dùng csv module và DictReader đọc file CSV đúng cách."
    explanation: "CSV là format phổ biến nhất khi nhận data từ khách. csv.reader đọc theo row, DictReader đọc theo column name — sạch hơn và dễ dùng hơn cho beginner. Bài này phải giúp learner mở được file CSV thật, hiểu header, lấy được data cần thiết."
    examples:
    - "import csv\nwith open('orders.csv', 'r', encoding='utf-8') as f:\n    reader = csv.reader(f)\n    header = next(reader)\n    print('Columns:', header)\n    for row in reader:\n        print(row)"
    - "import csv\nwith open('orders.csv', 'r', encoding='utf-8') as f:\n    reader = csv.DictReader(f)\n    for row in reader:\n        print(row['name'], row['total'])"
    exercise: "Đọc file orders.csv (có header: name, product, quantity, price), in 5 dòng đầu dạng đẹp, in tổng số đơn hàng."
    hints:
    - DictReader dùng header row làm key tự động.
    - Nhớ encoding cho tiếng Việt.
    sources:
    - tier: 1
      title: Python csv module
      url: https://docs.python.org/3/library/csv.html
    - tier: 2
      title: Real Python - Reading and Writing CSV Files
      url: https://realpython.com/python-csv/
    video:
    - tier: 2
      title: Corey Schafer - CSV Module
      url: https://www.youtube.com/watch?v=q5uM4VKywbA
    real_world_examples:
    - Đọc file đơn hàng từ Shopee export.
    - Đọc danh sách sản phẩm từ Excel save as CSV.
    best_practices:
    - Dùng DictReader cho code dễ đọc hơn.
    - Luôn kiểm tra header trước khi xử lý.
    - Test với 5 dòng trước khi chạy cả file.
    project_applications:
    - CSV viewer.
    - Order data reader.
    monetization:
    - "Đọc CSV = bước 1 của MỌI job data cleaning. Bạn đã đủ skill để nhận job clean CSV nhỏ. Mốc: clean_csv.py ở bài sau."
    duration_minutes: 20
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 18
    - 22
    - 31
    - 36
    - 37
  - id: 40
    title: Writing & Cleaning CSV
    objective: "Ghi CSV sạch, clean data (strip, deduplicate, validate rows)."
    explanation: "Đây là bài tập trung kỹ năng để làm first-money task. Clean CSV = nhận file bẩn từ khách → bỏ trùng, strip spaces, validate data → ghi ra file sạch. Nhưng chưa phải lúc post job. Hoàn thành package script + sample input/output + README + test command thì mới giao được."
    evidence:
    - claim: "Corey Schafer CSV Module video"
      type: "verified direct"
      source: "https://www.youtube.com/watch?v=q5uM4VKywbA — 1.4M views, 16:00, verified 2026-03-21"
    examples:
    - "import csv\nwith open('clean.csv', 'w', newline='', encoding='utf-8') as f:\n writer = csv.writer(f)\n writer.writerow(['name', 'email', 'total'])\n writer.writerow(['Luc', 'luc@example.com', 500000])"
    - "import csv\nrows_seen = set()\ncleaned = []\nwith open('dirty.csv', 'r', encoding='utf-8') as f:\n reader = csv.DictReader(f)\n for row in reader:\n key = row['email'].strip().lower()\n if key not in rows_seen:\n rows_seen.add(key)\n cleaned.append({\n 'name': row['name'].strip().title(),\n 'email': key,\n 'total': row['total'].strip()\n })\nprint(f'Cleaned: {len(cleaned)} rows (removed {len(rows_seen)} duplicates)')"
    exercise: "Nhận file dirty_orders.csv có data bẩn (tên thừa space, email trùng, số âm), clean và ghi ra cleaned_orders.csv. In summary: bao nhiêu dòng gốc, bao nhiêu dòng sạch, bao nhiêu dòng bị loại."
    hints:
    - Dùng set() để track duplicates.
    - strip() + lower() cho normalize.
    - Validate số > 0 trước khi giữ.
    sources:
    - tier: 1
      title: Python csv module
      url: https://docs.python.org/3/library/csv.html
    - tier: 2
      title: Real Python - Reading and Writing CSV Files
      url: https://realpython.com/python-csv/
    video:
    - tier: 2
      title: Corey Schafer - CSV Module
      url: https://www.youtube.com/watch?v=q5uM4VKywbA
    real_world_examples:
    - Clean danh sách khách hàng cho shop.
    - Loại đơn hàng trùng trước khi nhập hệ thống.
    best_practices:
    - Giữ file gốc, ghi ra file mới.
    - In summary trước/sau clean.
    - Test với sample nhỏ trước.
    project_applications:
    - CSV cleaner.
    - Data deduplicator.
    monetization:
      framing: "pre-money rehearsal"
      note: "Đây là DRILL để tập kỹ năng. Script clean CSV hoàn chỉnh có thể bán 300k-800k VND (coach observation từ Facebook groups). Nhưng learner cần hoàn thành bài 40-41, có deliverable package đầy đủ (script + sample input/output + README + test command) mới nên post job."
