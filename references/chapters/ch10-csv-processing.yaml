  - id: 41
    title: CSV Analysis & Simple Reports
    objective: "Tính tổng, trung bình, đếm, group từ CSV. Xuất báo cáo text/CSV."
    explanation: "Sau khi clean data, bước tiếp là phân tích và tạo report. Bài này dạy tính toán cơ bản trên CSV data + xuất report có format rõ ràng. Đây là upgrade từ clean → analyze → report, mỗi bước tăng giá trị deliverable."
    examples:
    - "import csv\ntotal = 0\ncount = 0\nwith open('orders.csv', 'r', encoding='utf-8') as f:\n    reader = csv.DictReader(f)\n    for row in reader:\n        total += int(row['amount'])\n        count += 1\nprint(f'Tong: {total:,} VND')\nprint(f'Trung binh: {total//count:,} VND')"
    - "# Group by date\nfrom collections import defaultdict\nimport csv\ndaily = defaultdict(int)\nwith open('orders.csv', 'r', encoding='utf-8') as f:\n    for row in csv.DictReader(f):\n        daily[row['date']] += int(row['amount'])\nfor date, total in sorted(daily.items()):\n    print(f'{date}: {total:,} VND')"
    exercise: "Từ file orders.csv, tạo báo cáo: tổng doanh thu, trung bình/đơn, ngày cao nhất, top 3 khách mua nhiều nhất. Ghi report ra file."
    hints:
    - defaultdict giúp group dễ.
    - sorted() + key để sort dict.
    - "Format số bằng f'{x:,}'."
    sources:
    - tier: 1
      title: Python csv module
      url: https://docs.python.org/3/library/csv.html
    - tier: 1
      title: Python collections module
      url: https://docs.python.org/3/library/collections.html
    - tier: 2
      title: Real Python - defaultdict
      url: https://realpython.com/python-defaultdict/
    video:
    - tier: 2
      title: Corey Schafer - CSV Module
      url: https://www.youtube.com/watch?v=q5uM4VKywbA
    real_world_examples:
    - Báo cáo doanh thu ngày cho shop.
    - Thống kê đơn hàng theo khách hàng.
    best_practices:
    - Validate data trước khi tính.
    - Format số có dấu phẩy cho VND.
    - Ghi cả report text lẫn CSV nếu khách cần.
    project_applications:
    - Daily revenue report.
    - Customer analytics.
    monetization:
    - "Script report từ CSV giá 500k-1.5m VND. Bạn đã có thể nhận job: clean data + tạo báo cáo. Package: script + sample + README."
