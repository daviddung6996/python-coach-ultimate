  - id: 44
    title: Building Automation Scripts
    objective: "Ghép file I/O + CSV + os thành script automation hoàn chỉnh có argument, logging, error handling."
    explanation: "Đây là bài tổng hợp. Một script automation thật cần nhận argument, scan folder, xử lý file, ghi output, và log kết quả. Bài này giúp learner ghép mọi thứ đã học thành 1 script chuyên nghiệp giao khách được."
    examples:
    - "import sys\nimport csv\nfrom pathlib import Path\n\ndef process_csv(input_path, output_path):\n    cleaned = 0\n    errors = 0\n    with open(input_path, 'r', encoding='utf-8') as fin:\n        reader = csv.DictReader(fin)\n        rows = []\n        for row in reader:\n            name = row['name'].strip().title()\n            if name:\n                rows.append({'name': name, 'email': row['email'].strip().lower()})\n                cleaned += 1\n            else:\n                errors += 1\n    with open(output_path, 'w', newline='', encoding='utf-8') as fout:\n        writer = csv.DictWriter(fout, fieldnames=['name', 'email'])\n        writer.writeheader()\n        writer.writerows(rows)\n    return cleaned, errors\n\nif __name__ == '__main__':\n    inp = sys.argv[1] if len(sys.argv) > 1 else 'input.csv'\n    out = sys.argv[2] if len(sys.argv) > 2 else 'output.csv'\n    c, e = process_csv(inp, out)\n    print(f'Done: {c} cleaned, {e} errors')"
    exercise: "Viết script tự động: scan folder → tìm tất cả file .csv → clean mỗi file (strip, deduplicate) → ghi cleaned file vào folder output/ → in summary log."
    hints:
    - Ghép pathlib.glob + csv module + error handling.
    - sys.argv cho argument từ terminal.
    - In log rõ ràng cho từng file.
    sources:
    - tier: 1
      title: Python sys module
      url: https://docs.python.org/3/library/sys.html
    - tier: 2
      title: Real Python - Command Line Interfaces
      url: https://realpython.com/command-line-interfaces-python-argparse/
    video:
    - tier: 2
      title: Corey Schafer - Automate Rename
      url: https://www.youtube.com/watch?v=ve2pmm5JqmI
    real_world_examples:
    - Script auto clean mọi CSV trong folder nhận từ khách.
    - Script scan + organize + report folder hàng tháng.
    best_practices:
    - Tách logic xử lý thành function.
    - Ghi log cho từng step.
    - Luôn có dry-run mode.
    project_applications:
    - CSV batch cleaner.
    - Folder automation script.
    monetization:
    - "Script automation hoàn chỉnh giá 500k-1.5m VND. Bạn đã ở Level 1 vững chắc, sẵn sàng nhận job."
    duration_minutes: 30
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 18
    - 22
    - 32
    - 33
    - 35
    - 36
    - 37
    - 38
    - 39
    - 40
    - 42
