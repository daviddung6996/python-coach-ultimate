- id: 11
  title: File System & Automation
  description: "Thao tác file system bằng os/pathlib — rename, organize, automate."
  lessons:
  - id: 42
    title: os & pathlib Basics
    objective: "Duyệt folder, kiểm tra file tồn tại, lấy thông tin file bằng os và pathlib."
    explanation: "Khi script cần tự tìm file, tạo folder, hoặc kiểm tra trước khi xử lý, os và pathlib là công cụ. pathlib cho cú pháp hiện đại, os cho backward compatibility. Bài này dạy đủ để learner viết script scan folder tự động."
    examples:
    - "from pathlib import Path\nfolder = Path('.')\nfor f in folder.iterdir():\n    if f.is_file():\n        print(f.name, f.suffix, f.stat().st_size)"
    - "from pathlib import Path\ncsv_files = list(Path('.').glob('*.csv'))\nprint(f'Tim thay {len(csv_files)} file CSV')\nfor f in csv_files:\n    print(f' - {f.name}')"
    - "import os\nif not os.path.exists('output'):\n    os.makedirs('output')\n    print('Da tao folder output')"
    exercise: "Viết script liệt kê tất cả file .csv và .txt trong folder hiện tại, in tên + kích thước (KB), tạo folder output/ nếu chưa có."
    hints:
    - pathlib.Path.glob() tìm file theo pattern.
    - stat().st_size cho size bytes.
    - mkdir(exist_ok=True) an toàn hơn.
    sources:
    - tier: 1
      title: Python pathlib module
      url: https://docs.python.org/3/library/pathlib.html
    - tier: 1
      title: Python os.path module
      url: https://docs.python.org/3/library/os.path.html
    - tier: 2
      title: Real Python - Python pathlib
      url: https://realpython.com/python-pathlib/
    video:
    - tier: 2
      title: Corey Schafer - Automate Rename
      url: https://www.youtube.com/watch?v=ve2pmm5JqmI
    real_world_examples:
    - Scan folder tìm file cần xử lý.
    - Tạo folder output tự động cho script.
    best_practices:
    - Ưu tiên pathlib cho code mới.
    - Dùng glob thay vì tự filter.
    - Luôn kiểm tra folder tồn tại trước khi ghi.
    project_applications:
    - Folder scanner.
    - File size reporter.
    monetization:
    - "Scan folder = bước mở đầu của mọi script automation. Ghép với CSV/rename = job hoàn chỉnh."
    duration_minutes: 20
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 18
    - 36
    - 37
  - id: 43
    title: Renaming & Organizing Files
    objective: "Rename file hàng loạt, tạo folder theo pattern, di chuyển file tự động."
    explanation: "Rename files = HIGH DEMAND TASK. Shop online cần rename 500 ảnh sản phẩm, văn phòng cần rename hợp đồng theo pattern. Bài này dạy os.rename, pathlib.rename, và pattern an toàn: dry-run trước, rename sau."
    examples:
    - "from pathlib import Path\nfolder = Path('photos')\nfor i, f in enumerate(sorted(folder.glob('*.jpg')), 1):\n    new_name = f'product_{i:03d}.jpg'\n    print(f'RENAME: {f.name} -> {new_name}')\n    # f.rename(folder / new_name)  # uncomment khi chac chan"
    - "from pathlib import Path\nimport shutil\nfor f in Path('.').glob('*.csv'):\n    dest = Path('csv_files')\n    dest.mkdir(exist_ok=True)\n    shutil.move(str(f), str(dest / f.name))\n    print(f'Moved: {f.name}')"
    exercise: "Rename 20 file ảnh (IMG_001.jpg đến IMG_020.jpg) thành product_001.jpg đến product_020.jpg. Trước khi rename thật, in dry-run để kiểm tra."
    hints:
    - Luôn dry-run trước khi rename thật.
    - enumerate() + format string cho số thứ tự.
    - Backup folder trước khi chạy.
    sources:
    - tier: 1
      title: Python pathlib module
      url: https://docs.python.org/3/library/pathlib.html
    - tier: 1
      title: Python shutil module
      url: https://docs.python.org/3/library/shutil.html
    - tier: 2
      title: Real Python - Working with Files
      url: https://realpython.com/working-with-files-in-python/
    video:
    - tier: 2
      title: Corey Schafer - Automate Rename
      url: https://www.youtube.com/watch?v=ve2pmm5JqmI
    real_world_examples:
    - Rename 500 ảnh sản phẩm cho shop Shopee.
    - Tổ chức file hợp đồng theo năm/tháng.
    best_practices:
    - LUÔN dry-run trước.
    - Backup trước khi rename hàng loạt.
    - Test trên 3 file trước khi chạy cả folder.
