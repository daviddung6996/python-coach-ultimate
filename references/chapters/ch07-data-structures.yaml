  - id: 29
    title: Tuples
    objective: Hiểu tuple dùng cho dữ liệu cố định và unpack tuple cơ bản.
    explanation: Tuple rất giống list ở chỗ có thứ tự, nhưng khác ở điểm không thay đổi được. Khi một nhóm dữ liệu mang tính cố định như tọa độ, màu RGB, hoặc cặp key-value tạm, tuple rất hợp. Bài này giúp learner biết khi nào tuple phù hợp hơn list và biết unpack tuple gọn gàng.
    examples:
    - 'point = (10, 20)

      print(point[0], point[1])'
    - 'rgb = (255, 120, 0)

      r, g, b = rgb

      print(r, g, b)'
    - 'coords = (21.0285, 105.8542)

      print(coords)'
    exercise: Tạo một tuple tọa độ và một tuple RGB. Unpack từng tuple ra biến riêng rồi in kết quả.
    hints:
    - Tuple dùng `()`.
    - Có thể unpack tuple giống list.
    sources:
    - tier: 1
      title: Python Tutorial - Tuples and Sequences
      url: https://docs.python.org/3/tutorial/datastructures.html#tuples-and-sequences
    - tier: 2
      title: Real Python - Lists and Tuples in Python
      url: https://realpython.com/python-lists-tuples/
    - tier: 1
      title: CS50P Week 3
      url: https://cs50.harvard.edu/python/2022/weeks/3/
    video:
    - tier: 2
      title: Corey Schafer - Lists, Tuples, and Sets
      url: https://www.youtube.com/watch?v=W8KRzm-HUcc
    extra_practice: ''
    real_world_examples:
    - Lưu tọa độ địa điểm.
    - Lưu bộ màu RGB hoặc kích thước cố định.
    best_practices:
    - Dùng tuple khi dữ liệu nên “khó bị sửa nhầm”.
    - Unpack tuple để code đọc dễ hơn.
    - Không cố sửa tuple; nếu cần sửa, chuyển sang list.
    project_applications:
    - RGB unpacker.
    - Coordinate viewer.
    monetization:
    - "Tuple giữ data cố định — dùng cho config, tọa độ, constant. Chọn đúng cấu trúc = code ít bug hơn."
    duration_minutes: 20
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 22
    - 23
    - 24
    solution_hint: ''
    common_mistakes:
    - Tưởng tuple sửa được như list.
    - Quên tuple 1 phần tử cần dấu phẩy.
  - id: 30
    title: Sets
    objective: Dùng set để bỏ trùng, kiểm tra membership nhanh, và làm toán tập hợp cơ bản.
    explanation: Set rất mạnh cho data cleaning. Khi bài toán là “lấy unique”, “kiểm tra có tồn tại”, hoặc “so sánh 2 nhóm có giao nhau không”, set gần như là câu trả lời mặc định. Bài này thực dụng hơn list vì nó chạm ngay vào các case deduplicate trong công việc.
    examples:
    - 'emails = [''a@gmail.com'', ''a@gmail.com'', ''b@gmail.com'']

      unique_emails = set(emails)

      print(unique_emails)'
    - 'tags_a = {''python'', ''sql''}

      tags_b = {''python'', ''excel''}

      print(tags_a & tags_b)'
    - 'skills = {''python'', ''supabase''}

      print(''python'' in skills)'
    exercise: Cho 2 danh sách email khách hàng, hãy lấy tập email unique của mỗi nhóm và tìm phần giao nhau giữa hai nhóm.
    hints:
    - Set không giữ thứ tự.
    - Toán giao dùng `&`, hợp dùng `|`.
    sources:
    - tier: 1
      title: Python Tutorial - Sets
      url: https://docs.python.org/3/tutorial/datastructures.html#sets
    - tier: 2
      title: Real Python - Python Sets
      url: https://realpython.com/python-sets/
    - tier: 1
      title: CS50P Week 3
      url: https://cs50.harvard.edu/python/2022/weeks/3/
    video:
    - tier: 2
      title: Corey Schafer - Lists, Tuples, and Sets
      url: https://www.youtube.com/watch?v=W8KRzm-HUcc
    extra_practice: ''
    real_world_examples:
    - Xóa email trùng khi tổng hợp lead.
    - So sánh 2 nhóm khách hàng có trùng nhau không.
    best_practices:
    - Dùng set cho unique/membership, không cố giữ order.
    - Chuyển list sang set có chủ đích.
    - Đặt tên biến phản ánh đây là tập hợp unique.
    project_applications:
    - Unique email cleaner.
    - Overlap checker between two groups.
    monetization:
    - "Set bỏ trùng = kỹ năng đầu tiên của data cleaning. Deduplicate email, mã hàng — task rất hay gặp, giá 300k-500k."
    duration_minutes: 20
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 22
    - 23
    - 27
    solution_hint: ''
    common_mistakes:
    - Tưởng set giữ thứ tự như list.
    - Quên rằng set không chứa phần tử mutable như list.
  - id: 31
    title: Dictionaries
    objective: Dùng dict để lưu dữ liệu key-value và truy cập/cập nhật dữ liệu theo khóa.
    explanation: Dict là cấu trúc cực quan trọng vì JSON, API response, config, hồ sơ user đều gần với dict. Khi learner hiểu dict, rất nhiều thứ trong Python bắt đầu “vào form”. Bài này phải làm rõ key, value, truy cập, thêm, sửa, kiểm tra key, và vì sao dict phù hợp hơn list trong nhiều bài toán hồ sơ.
    examples:
    - 'user = {''name'': ''Luc'', ''age'': 25}

      print(user[''name''])'
    - 'product = {''name'': ''Bàn phím'', ''price'': 450000}

      product[''stock''] = 12

      print(product)'
    - 'settings = {''theme'': ''dark''}

      print(''theme'' in settings)'
    exercise: Tạo dict hồ sơ user gồm tên, tuổi, nghề nghiệp. Sau đó thêm trường email, cập nhật tuổi, và in toàn bộ dict.
    hints:
    - Key thường là string với beginner.
    - Dùng `in` để kiểm tra key tồn tại.
    sources:
    - tier: 1
      title: Python Tutorial - Dictionaries
      url: https://docs.python.org/3/tutorial/datastructures.html#dictionaries
    - tier: 2
      title: Real Python - Dictionaries in Python
      url: https://realpython.com/python-dicts/
    - tier: 1
      title: CS50P Week 3
      url: https://cs50.harvard.edu/python/2022/weeks/3/
    video:
    - tier: 2
      title: Corey Schafer - Dictionaries
      url: https://www.youtube.com/watch?v=daefaLgNkw0
    extra_practice: ''
    real_world_examples:
    - Lưu hồ sơ khách hàng hoặc config script.
    - Xử lý JSON trả về từ API.
    best_practices:
    - Chọn key nhất quán, dễ đọc.
    - Kiểm tra key trước khi truy cập nếu chưa chắc.
    - Tách dict cấu hình khỏi logic xử lý.
    project_applications:
    - User profile manager.
    - Simple config dictionary tool.
    monetization:
    - "Dict = JSON, API response, config, hồ sơ user. Hiểu dict = mở cửa automation và API integration — Level 2 đang tới."
    duration_minutes: 20
    prerequisites:
