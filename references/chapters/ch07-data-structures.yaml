- id: 7
  title: Python Data Structures
  description: Làm chủ list, tuple, set, dict và các pattern xử lý dữ liệu thực dụng.
  project_milestone:
    projects:
    - project: P1 — User Registration System
      step: "Step 5: Data Storage với List of Dicts"
      task: |
        Nâng cấp registration_loop.py thành registration_system.py:
        1. registered_users = [] — list lưu user dicts
        2. failed_registrations = [] — list lưu failed dicts
        3. Khi đăng ký thành công: tạo dict {"name": ..., "email": ..., "password": ..., "status": "active"}
        4. Append dict vào registered_users
        5. Khi đăng ký thất bại: tạo dict {"email": ..., "error": "lý do"}
        6. Append vào failed_registrations
        7. Check duplicate email: dùng for loop qua registered_users
        8. Khi thoát: in toàn bộ registered_users và failed_registrations
      concepts_used: [list of dicts, dict creation, list.append(), for loop search, "in" check]
    - project: P2 — Expense Tracking System
      step: "Step 4: Structured Expenses"
      task: |
        Nâng cấp expense_aggregator.py thành expense_system.py:
        1. expenses = [] — list lưu expense dicts
        2. Mỗi expense: {"amount": ..., "category": ..., "description": ...}
        3. Thêm 5+ expenses bằng .append()
        4. Loop qua expenses tính tổng
        5. Loop + filter: tổng theo category (so sánh .lower())
        6. Dùng enumerate in bảng chi tiêu có đánh số
      concepts_used: [list of dicts, dict access ["key"], loop + filter, enumerate]
    - project: P3 — Mini Banking System
      step: "Step 4: Account với Nested Data"
      task: |
        Nâng cấp banking_loop.py thành banking_system.py:
        1. accounts = [] — list lưu account dicts
        2. Mỗi account: {"name": ..., "balance": ..., "transactions": []}
        3. Mỗi transaction: {"type": "Deposit"/"Withdrawal", "amount": ...}
        4. Khi deposit/withdraw: append transaction dict vào account["transactions"]
        5. show_account: in name, balance, rồi loop in tất cả transactions
        6. Tìm account bằng for loop qua accounts, so sánh name.lower()
      concepts_used: [nested data — dict chứa list of dicts, dict mutation, list.append() nested]
    note: "Cả 3 project giờ đã có data structure hoàn chỉnh. Chapter 8 sẽ wrap thành functions sạch + exception handling."
  lessons:
  - id: 22
    title: Lists Overview
    objective: Hiểu list là gì, khi nào dùng list, và vì sao nó là cấu trúc dữ liệu cơ bản nhất cho beginner.
    explanation: 'List là collection có thứ tự, thay đổi được, và xuất hiện ở khắp nơi: danh sách sản phẩm, dòng dữ liệu, file names, API items. Bài này chưa sa vào method quá nhiều; mục tiêu là giúp learner nhìn bài toán và biết “cái này nên là list”.'
    examples:
    - 'products = [''chuột'', ''bàn phím'', ''tai nghe'']

      print(products)'
    - 'scores = [7, 8, 9]

      print(len(scores))'
    exercise: 'Tạo 3 list khác nhau: tên tướng TFT, sản phẩm shop, trạng thái đơn hàng. In độ dài từng list.'
    hints:
    - List dùng dấu ngoặc vuông `[]`.
    - Các phần tử cách nhau bằng dấu phẩy.
    sources:
