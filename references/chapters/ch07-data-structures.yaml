  - id: 24
    title: Unpacking & Analyzing
    objective: Biết unpack list và phân tích list bằng len, count, index, membership.
    explanation: Phân tích list không chỉ là duyệt từng phần tử. Bài này dạy unpacking để lấy nhanh các phần quan trọng và dùng các method cơ bản để trả lời câu hỏi như có bao nhiêu phần tử, một item nằm ở đâu, hoặc có xuất hiện hay không. Đây là bước từ “có list” sang “đọc được list”.
    examples:
    - 'first, second, third = [''a'', ''b'', ''c'']

      print(first, third)'
    - 'items = [''a'', ''b'', ''a'']

      print(items.count(''a''))'
    - 'numbers = [10, 20, 30]

      print(20 in numbers)

      print(numbers.index(30))'
    exercise: 'Cho một list tên học viên, hãy: unpack 2 tên đầu, kiểm tra xem tên `Luc` có trong list không, và đếm xem `An` xuất hiện bao nhiêu lần.'
    hints:
    - Unpack cần số biến khớp số phần tử, trừ khi dùng `*rest`.
    - Dùng `in` để kiểm tra có tồn tại hay không.
    sources:
    - tier: 1
      title: Python Tutorial - Sequence Unpacking
      url: https://docs.python.org/3/tutorial/datastructures.html
    - tier: 2
      title: Real Python - Packing and Unpacking Arguments
      url: https://realpython.com/python-kwargs-and-args/
    - tier: 2
      title: Real Python - Python Lists and Tuples
      url: https://realpython.com/python-lists-tuples/
    video:
    - tier: 2
      title: Corey Schafer - Lists, Tuples, and Sets
      url: https://www.youtube.com/watch?v=W8KRzm-HUcc
    extra_practice: ''
    real_world_examples:
    - Lấy top 3 sản phẩm bán chạy nhất.
    - Kiểm tra một mã hàng có nằm trong danh sách cấm hay không.
    best_practices:
    - Dùng unpack khi cấu trúc dữ liệu ngắn, rõ.
    - Dùng `in` trước khi `index()` nếu không chắc phần tử tồn tại.
    - Giữ code phân tích list tách biệt khỏi code render output.
