  - id: 28
    title: Lambda & List Comprehension
    objective: Dùng list comprehension và lambda ở mức practical, không màu mè.
    explanation: 'List comprehension giúp viết logic tạo list mới gọn hơn khi pattern đơn giản. Lambda hữu ích cho các hàm cực ngắn dùng một chỗ, nhưng lạm dụng lambda sẽ làm code khó đọc. Bài này phải đặt tiêu chuẩn đúng: comprehension cho transform/filter ngắn; lambda chỉ dùng khi thật rõ.'
    examples:
    - 'squares = [n * n for n in range(1, 6)]

      print(squares)'
    - 'even_squares = [n * n for n in range(1, 11) if n % 2 == 0]

      print(even_squares)'
    - 'add = lambda a, b: a + b

      print(add(2, 3))'
    exercise: Tạo list bình phương các số chẵn từ 1 đến 20 bằng list comprehension. Sau đó viết lambda cộng 2 số và gọi thử.
    hints:
