  - id: 23
    title: Creating & Accessing Lists
    objective: Tạo list và truy cập phần tử bằng index dương/âm một cách chắc chắn.
    explanation: Một list có ích khi bạn lấy được đúng phần tử mình cần. Bài này dạy tạo list, index dương, index âm, và lỗi index out of range. Đây là kỹ năng nền để các bài thêm/xóa/sửa list sau này không bị mù mờ.
    examples:
    - 'fruits = [''apple'', ''banana'', ''cherry'']

      print(fruits[0])'
    - 'fruits = [''apple'', ''banana'', ''cherry'']

      print(fruits[-1])'
    - 'numbers = [10, 20, 30, 40]

      print(numbers[1:3])'
    exercise: Tạo một list 5 sản phẩm rồi in ra phần tử đầu, cuối, và phần tử ở giữa.
    hints:
    - Index bắt đầu từ 0.
    - Index âm đếm từ cuối.
    sources:
