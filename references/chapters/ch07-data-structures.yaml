  - id: 26
    title: Sorting & Combining
    objective: Biết sort, reverse, copy, và combine lists cho nhu cầu xử lý dữ liệu thường gặp.
    explanation: Khi xử lý danh sách thật, bạn thường cần gộp nhiều nguồn dữ liệu, sắp xếp theo tiêu chí, hoặc copy để tránh sửa dữ liệu gốc. Bài này dạy `sorted()`, `.sort()`, `.reverse()`, copy list, nối list, và tư duy “dữ liệu gốc có cần giữ nguyên không?”.
    examples:
    - 'prices = [120, 50, 200]

      print(sorted(prices))'
    - 'items = [''b'', ''c'', ''a'']

      items.sort()

      print(items)'
    - 'a = [1, 2]

      b = [3, 4]

      print(a + b)'
    exercise: Gộp 2 danh sách đơn hàng, sort theo giá tăng dần, và tạo bản copy trước khi reverse danh sách.
    hints:
    - '`sorted()` trả list mới; `.sort()` sửa tại chỗ.'
    - Copy bằng `list.copy()` hoặc `[:]`.
    sources:
    - tier: 1
