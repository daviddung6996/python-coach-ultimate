    - Lọc dữ liệu log chỉ giữ các dòng lỗi.
    best_practices:
    - Viết pattern lọc bằng loop trước khi dùng list comprehension.
    - Giữ tên `result` hoặc `filtered_items` rõ nghĩa.
    - Test với list rỗng và list không item nào match.
