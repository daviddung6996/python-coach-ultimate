  - id: 27
    title: Iterables & Filtering
    objective: Hiểu iterable là gì và lọc dữ liệu bằng loop, condition, và các pattern cơ bản.
    explanation: 'Iterable là bất cứ thứ gì bạn có thể duyệt từng phần tử: list, tuple, set, string, dict. Bài này kết nối các bài list + loop để giải bài toán lọc dữ liệu thực: chỉ lấy item hợp lệ, item thỏa điều kiện, item cần xử lý. Đây là nhịp cầu trước list comprehension.'
    examples:
    - "numbers = [1, -2, 3, -4]\npositive = []\nfor n in numbers:\n    if n > 0:\n        positive.append(n)\nprint(positive)"
    - "emails = ['a@gmail.com', 'b@yahoo.com']\nfor email in emails:\n    if email.endswith('gmail.com'):\n        print(email)"
    exercise: Cho một list số, lọc ra các số chẵn dương. Sau đó với một list email, lọc ra các email gmail.
    hints:
    - 'Nghĩ theo pattern: duyệt -> kiểm tra -> thêm vào kết quả.'
    - Tạo list kết quả riêng thay vì sửa list gốc khi mới học.
    sources:
    - tier: 1
      title: Python Glossary - Iterable
      url: https://docs.python.org/3/glossary.html#term-iterable
    - tier: 2
      title: Real Python - Python filter()
      url: https://realpython.com/python-filter-function/
    - tier: 2
      title: Real Python - Python for Loops
      url: https://realpython.com/python-for-loop/
