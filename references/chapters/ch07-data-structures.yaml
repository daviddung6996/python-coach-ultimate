  - id: 25
    title: Add, Remove & Update
    objective: Thêm, xóa, sửa phần tử trong list đúng cách và hiểu sự khác nhau giữa append, insert, remove, pop, del.
    explanation: 'Đây là bài rất thực dụng vì mọi danh sách động đều cần thay đổi theo thời gian. Quan trọng nhất là hiểu đúng method đang làm gì: append thêm cuối, insert chèn theo index, remove xóa theo giá trị, pop lấy và xóa, del xóa theo vị trí. Nếu mơ hồ ở đây, learner sẽ sửa nhầm dữ liệu liên tục.'
    examples:
    - 'items = [''a'', ''b'']

      items.append(''c'')

      print(items)'
    - 'items = [''a'', ''c'']

      items.insert(1, ''b'')

      print(items)'
    - 'items = [''a'', ''b'', ''c'']

      items.remove(''b'')

      last = items.pop()

      print(items, last)'
    exercise: Tạo list giỏ hàng, thêm 2 sản phẩm, chèn 1 sản phẩm vào giữa, xóa 1 sản phẩm đã hết hàng, rồi in list cuối cùng.
    hints:
    - '`remove` xóa theo value, `pop` xóa theo index hoặc cuối list.'
    - Nếu không chắc item có tồn tại, kiểm tra trước khi remove.
    sources:
    - tier: 1
      title: Python Tutorial - More on Lists
      url: https://docs.python.org/3/tutorial/datastructures.html#more-on-lists
    - tier: 2
      title: Real Python - Removing Items From Lists
      url: https://realpython.com/remove-item-from-list-python/
