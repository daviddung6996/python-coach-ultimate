      title: Corey Schafer - Lists, Tuples, and Sets
      url: https://www.youtube.com/watch?v=W8KRzm-HUcc
    extra_practice: ''
    real_world_examples:
    - Danh sách sản phẩm trong giỏ hàng.
    - Danh sách file cần xử lý hàng loạt.
    best_practices:
    - Phân biệt list với string ngay từ đầu.
    - Đặt tên list ở số nhiều nếu hợp lý.
    - Tự hỏi dữ liệu có cần giữ thứ tự không.
