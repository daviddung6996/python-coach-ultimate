- id: 9
  title: File I/O
  description: "Đọc, ghi, và xử lý file text — kỹ năng bắt buộc để làm job thật."
  lessons:
  - id: 36
    title: Reading & Writing Text Files
    objective: "Đọc file text bằng open()/with, ghi file mới, hiểu context manager."
    explanation: "Đây là bài mở cửa first-money. Mọi job data cleaning, report, automation đều bắt đầu từ đọc file. `with open()` là pattern an toàn mặc định. Bài này phải giúp learner đọc được file thật, ghi được output thật, không chỉ print ra terminal."
    evidence:
    - claim: "Đọc/ghi file = kỹ năng bắt buộc cho mọi job data"
      type: "coach heuristic"
      source: "internal market observation from Luc + Facebook groups freelance listings"
    - claim: "Corey Schafer File Objects video"
      type: "verified direct"
      source: "https://www.youtube.com/watch?v=Uh2ebFW8OYM — 2M views, 24:00, verified 2026-03-21"
    examples:
    - "with open('input.txt', 'r', encoding='utf-8') as f:\n content = f.read()\nprint(content)"
    - "with open('output.txt', 'w', encoding='utf-8') as f:\n f.write('Dong 1\\n')\n f.write('Dong 2\\n')"
    - "with open('data.txt', 'r', encoding='utf-8') as f:\n for line in f:\n print(line.strip())"
    exercise: "Đọc file chứa danh sách tên khách hàng (mỗi dòng 1 tên), chuẩn hóa về Title Case, ghi ra file mới."
    hints:
    - Luôn dùng with open.
    - "Nhớ encoding='utf-8' cho tiếng Việt."
    - strip() mỗi dòng trước khi xử lý.
    sources:
    - tier: 1
      title: Python Tutorial - Reading and Writing Files
      url: https://docs.python.org/3/tutorial/inputoutput.html#reading-and-writing-files
    - tier: 2
      title: Real Python - Reading and Writing Files
      url: https://realpython.com/read-write-files-python/
    - tier: 1
      title: CS50P Week 6
      url: https://cs50.harvard.edu/python/2022/weeks/6/
    video:
    - tier: 2
      title: Corey Schafer - File Objects
      url: https://www.youtube.com/watch?v=Uh2ebFW8OYM
      views: "2M"
      duration: "24:00"
    real_world_examples:
    - Đọc danh sách khách hàng từ file text.
    - Ghi báo cáo kết quả ra file text.
    best_practices:
    - Luôn dùng context manager (with).
    - Chỉ định encoding rõ ràng.
    - Đóng file tự động bằng with thay vì f.close().
    project_applications:
    - Customer name cleaner.
    - Text file processor.
    monetization:
      framing: "pre-money rehearsal"
      note: "Đây là bài mở khóa kỹ năng đọc/ghi file. MỌI job first-money đều cần skill này. Nhưng bài 36-41 là rehearsal — chưa phải lúc post job. Mốc thật: hoàn thành bài 40-41 (CSV processing) thì mới đủ package giao khách."
