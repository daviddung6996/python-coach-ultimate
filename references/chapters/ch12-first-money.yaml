    objective: "Capstone project: rename + organize photos cho shop online theo pattern chuẩn."
    explanation: "Đây là CAPSTONE PROJECT thứ ba. Hoàn thành = learner có 3 deliverable trong portfolio. Rename/organize photos giá 300k-500k VND (verified signal từ Facebook groups), demand cao vì output nhìn thấy ngay."
