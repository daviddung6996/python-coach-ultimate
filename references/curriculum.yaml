- id: 3
  title: Python Numbers
  description: Hiểu số trong Python, phép toán, làm tròn, và module math cho tác vụ thường gặp.
  project_milestone:
    project: P2 — Expense Tracking System
    step: "Step 1: Expense Calculator"
    task: |
      Viết script expense_calc.py:
      1. Tạo 4-5 biến expense: food = 50000, transport = 20000, coffee = 15000, ...
      2. Tính tổng tất cả expenses
      3. Tính trung bình (tổng / số expense)
      4. Làm tròn trung bình bằng round()
      5. In: "Tổng chi: X VND", "Trung bình: Y VND"
    concepts_used: [int, float, math operators (+, /, //), round()]
    example: |
      food = 50000
      transport = 20000
      coffee = 15000
      total = food + transport + coffee
      average = round(total / 3)
      print(f"Tổng chi: {total} VND")
      print(f"Trung bình: {average} VND")
    note: "Chapter 6 sẽ dạy loop để tự động tính tổng list. Bây giờ tính bằng tay trước."
  lessons:
  - id: 10
    title: Numeric Data Types & Math Operators
    objective: Hiểu int, float, các toán tử số học, và dùng chúng để tính toán đúng.
    explanation: Numbers là phần lõi của hầu hết script tính tiền, tính điểm, phần trăm, tồn kho. Bài này dạy int/float, cộng trừ nhân chia, chia lấy dư, lũy thừa, và tư duy đọc biểu thức. Không cần thần thánh hóa toán học; điều cần là learner viết được phép tính đúng và hiểu dữ liệu đầu ra là gì.
    examples:
    - 'a = 7

      b = 3

      print(a + b, a - b, a * b)'
    - 'print(7 / 3)

      print(7 // 3)

      print(7 % 3)'
    - 'price = 120000

      discount = 0.1

      print(price * (1 - discount))'
    exercise: Viết mini calculator nhận 2 số từ user và in ra tổng, hiệu, tích, thương, chia lấy dư.
    hints:
    - Phân biệt `/` và `//`.
    - Nếu nhận input, nhớ ép kiểu.
