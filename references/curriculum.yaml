- id: 6
  title: Python Loops
  description: Lặp dữ liệu với for/while và kiểm soát vòng lặp bằng break, continue, pass, for-else.
  project_milestone:
    projects:
    - project: P2 — Expense Tracking System
      step: "Step 3: Expense Aggregator"
      task: |
        Viết script expense_aggregator.py:
        1. Tạo list expenses (hardcoded): [50000, 20000, 100000, 15000, 30000]
        2. Tạo list categories: ["Food", "Transport", "Food", "Coffee", "Food"]
        3. Dùng for loop tính tổng tất cả expenses
        4. Dùng for loop + if đếm số expense thuộc "Food"
        5. Dùng for + enumerate in: "1. Food - 50000 VND"
      concepts_used: [for loop, enumerate, accumulator pattern, loop + if filter]
    - project: P3 — Mini Banking System
      step: "Step 3: Multi-Transaction Loop"
      task: |
        Mở rộng banking_menu.py thành banking_loop.py:
        1. balance = 1000000
        2. transactions = [] (list rỗng, sẽ append string mô tả mỗi giao dịch)
        3. while True: hỏi action
        4. if action == "exit": break
        5. Xử lý deposit/withdraw/check như Chapter 5
        6. Mỗi giao dịch thành công: transactions.append("Deposit 500000")
        7. Khi exit: for loop in tất cả transactions
      concepts_used: [while True + break, for loop, list.append(), accumulator]
    - project: P1 — User Registration System
      step: "Step 4: Multi-User Registration Loop"
      task: |
        Mở rộng registration_form.py thành registration_loop.py:
        1. while True: hỏi user muốn đăng ký hay thoát
        2. Nếu đăng ký: nhập name/email/password, validate (dùng code từ Ch.2 + Ch.4)
        3. Nếu hợp lệ: in "Đăng ký thành công"
        4. Nếu không: in lý do fail
        5. Nếu thoát: break và in tổng số lần đăng ký thành công/thất bại
      concepts_used: [while True + break, counter variables, loop + conditionals]
    note: "Bây giờ 3 project đều chạy được nhiều lần. Chapter 7 sẽ nâng cấp lên lưu data bằng dicts."
  lessons:
