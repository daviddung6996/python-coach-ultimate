    - Tưởng set giữ thứ tự như list.
    - Quên rằng set không chứa phần tử mutable như list.
  - id: 31
    title: Dictionaries
    objective: Dùng dict để lưu dữ liệu key-value và truy cập/cập nhật dữ liệu theo khóa.
    explanation: Dict là cấu trúc cực quan trọng vì JSON, API response, config, hồ sơ user đều gần với dict. Khi learner hiểu dict, rất nhiều thứ trong Python bắt đầu “vào form”. Bài này phải làm rõ key, value, truy cập, thêm, sửa, kiểm tra key, và vì sao dict phù hợp hơn list trong nhiều bài toán hồ sơ.
    examples:
    - 'user = {''name'': ''Luc'', ''age'': 25}

      print(user[''name''])'
    - 'product = {''name'': ''Bàn phím'', ''price'': 450000}

      product[''stock''] = 12

      print(product)'
    - 'settings = {''theme'': ''dark''}

      print(''theme'' in settings)'
    exercise: Tạo dict hồ sơ user gồm tên, tuổi, nghề nghiệp. Sau đó thêm trường email, cập nhật tuổi, và in toàn bộ dict.
    hints:
    - Key thường là string với beginner.
    - Dùng `in` để kiểm tra key tồn tại.
    sources:
    - tier: 1
      title: Python Tutorial - Dictionaries
      url: https://docs.python.org/3/tutorial/datastructures.html#dictionaries
    - tier: 2
