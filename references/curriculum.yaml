  - id: 29
    title: Tuples
    objective: Hiểu tuple dùng cho dữ liệu cố định và unpack tuple cơ bản.
    explanation: Tuple rất giống list ở chỗ có thứ tự, nhưng khác ở điểm không thay đổi được. Khi một nhóm dữ liệu mang tính cố định như tọa độ, màu RGB, hoặc cặp key-value tạm, tuple rất hợp. Bài này giúp learner biết khi nào tuple phù hợp hơn list và biết unpack tuple gọn gàng.
    examples:
    - 'point = (10, 20)

      print(point[0], point[1])'
    - 'rgb = (255, 120, 0)

      r, g, b = rgb

      print(r, g, b)'
    - 'coords = (21.0285, 105.8542)

      print(coords)'
    exercise: Tạo một tuple tọa độ và một tuple RGB. Unpack từng tuple ra biến riêng rồi in kết quả.
    hints:
    - Tuple dùng `()`.
    - Có thể unpack tuple giống list.
    sources:
    - tier: 1
      title: Python Tutorial - Tuples and Sequences
      url: https://docs.python.org/3/tutorial/datastructures.html#tuples-and-sequences
    - tier: 2
      title: Real Python - Lists and Tuples in Python
      url: https://realpython.com/python-lists-tuples/
    - tier: 1
      title: CS50P Week 3
