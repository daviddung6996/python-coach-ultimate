  - id: 33
    title: Function Parameters & Return
    objective: Dùng parameters, return, default values, keyword arguments đúng cách.
    explanation: 'Một hàm chỉ thật sự mạnh khi nhận input và trả output. Bài này là mốc rất quan trọng vì từ đây learner có thể viết những khối logic tái sử dụng cho bài toán thật: tính tiền, format dữ liệu, validate đầu vào. `return` là điểm cần làm chắc: hàm không chỉ in ra, mà còn trả dữ liệu về cho phần khác dùng tiếp.'
    examples:
    - "def add(a, b):\n    return a + b\n\nprint(add(2, 3))"
    - "def calculate_total(price, qty, discount=0):\n    return price * qty * (1 - discount)\n\nprint(calculate_total(100, 2, 0.1))"
    - "def greet(name, city='Hanoi'):\n    return f'Xin chào {name} từ {city}'"
    exercise: Viết hàm `calculate_total(price, qty, discount=0)` và dùng nó để tính tiền cho 3 đơn hàng khác nhau.
    hints:
    - Nếu muốn dùng kết quả tiếp, phải `return` thay vì chỉ `print`.
    - Default parameter nên đặt ở cuối.
    sources:
    - tier: 1
      title: Python Tutorial - Defining Functions
      url: https://docs.python.org/3/tutorial/controlflow.html#defining-functions
    - tier: 2
      title: Real Python - The Python return Statement
      url: https://realpython.com/python-return-statement/
    - tier: 2
      title: Real Python - Python Optional Arguments
      url: https://realpython.com/python-optional-arguments/
    video:
    - tier: 2
      title: Corey Schafer - Functions
      url: https://www.youtube.com/watch?v=9Os0o3wzS_I
    extra_practice: ''
    real_world_examples:
    - Viết hàm tính tổng đơn hàng để dùng lại nhiều nơi.
    - Viết hàm format dữ liệu CSV trước khi xuất file.
    best_practices:
    - Dùng return cho dữ liệu, print cho debug/output cuối.
    - Parameter name phải nói rõ ý nghĩa.
    - Default args phải an toàn, đừng dùng mutable mặc định.
    project_applications:
    - Order total calculator function.
    - Reusable discount function pack.
    monetization:
    - "Parameters + return = hàm nhận input, trả output. Đây là cột mốc: bạn đã viết được khối logic tái sử dụng cho script hoàn chỉnh. Level 1 đã mở nếu hoàn thành 1 project."
    duration_minutes: 20
    prerequisites:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 32
    solution_hint: ''
    common_mistakes:
    - Quên return nên kết quả là None.
    - Đặt mutable object làm default arg.
  - id: 34
    title: Types of Python Functions
    objective: Phân biệt các kiểu hàm phổ biến trong Python và dùng chúng đúng ngữ cảnh.
    explanation: Không phải hàm nào cũng giống nhau. Có hàm không tham số, hàm có tham số, hàm trả về giá trị, hàm có default args, *args, **kwargs, và hàm nhận hàm khác làm đối số. Bài này giúp learner nhìn bức tranh tổng quát nhưng vẫn bám practical, không đi lan man vào functional programming nặng đầu.
    examples:
    - "def say_hi():\n    return 'hi'"
    - "def total(*numbers):\n    return sum(numbers)"
    - "def profile(**info):\n    return info\n\nprint(profile(name='Luc', role='Learner'))"
    exercise: Viết 1 hàm không tham số, 1 hàm nhận *args để tính tổng, và 1 hàm nhận **kwargs để in hồ sơ user.
    hints:
    - '*args gom positional args, **kwargs gom named args.'
    - Không cần dùng mấy kiểu này nếu function thường đã đủ.
    sources:
    - tier: 1
      title: Python Tutorial - Arbitrary Argument Lists
      url: https://docs.python.org/3/tutorial/controlflow.html#arbitrary-argument-lists
