  - id: 30
    title: Sets
    objective: Dùng set để bỏ trùng, kiểm tra membership nhanh, và làm toán tập hợp cơ bản.
    explanation: Set rất mạnh cho data cleaning. Khi bài toán là “lấy unique”, “kiểm tra có tồn tại”, hoặc “so sánh 2 nhóm có giao nhau không”, set gần như là câu trả lời mặc định. Bài này thực dụng hơn list vì nó chạm ngay vào các case deduplicate trong công việc.
    examples:
    - 'emails = [''a@gmail.com'', ''a@gmail.com'', ''b@gmail.com'']

      unique_emails = set(emails)

      print(unique_emails)'
    - 'tags_a = {''python'', ''sql''}

      tags_b = {''python'', ''excel''}

      print(tags_a & tags_b)'
    - 'skills = {''python'', ''supabase''}

      print(''python'' in skills)'
    exercise: Cho 2 danh sách email khách hàng, hãy lấy tập email unique của mỗi nhóm và tìm phần giao nhau giữa hai nhóm.
    hints:
    - Set không giữ thứ tự.
    - Toán giao dùng `&`, hợp dùng `|`.
    sources:
    - tier: 1
      title: Python Tutorial - Sets
      url: https://docs.python.org/3/tutorial/datastructures.html#sets
    - tier: 2
      title: Real Python - Python Sets
      url: https://realpython.com/python-sets/
    - tier: 1
      title: CS50P Week 3
      url: https://cs50.harvard.edu/python/2022/weeks/3/
    video:
    - tier: 2
      title: Corey Schafer - Lists, Tuples, and Sets
      url: https://www.youtube.com/watch?v=W8KRzm-HUcc
    extra_practice: ''
    real_world_examples:
    - Xóa email trùng khi tổng hợp lead.
    - So sánh 2 nhóm khách hàng có trùng nhau không.
    best_practices:
    - Dùng set cho unique/membership, không cố giữ order.
    - Chuyển list sang set có chủ đích.
    - Đặt tên biến phản ánh đây là tập hợp unique.
    project_applications:
    - Unique email cleaner.
    - Overlap checker between two groups.
    monetization:
    - "Set bỏ trùng = kỹ năng đầu tiên của data cleaning. Deduplicate email, mã hàng — task rất hay gặp, giá 300k-500k."
