    - Lưu bộ màu RGB hoặc kích thước cố định.
    best_practices:
    - Dùng tuple khi dữ liệu nên “khó bị sửa nhầm”.
    - Unpack tuple để code đọc dễ hơn.
    - Không cố sửa tuple; nếu cần sửa, chuyển sang list.
    project_applications:
    - RGB unpacker.
    - Coordinate viewer.
    monetization:
    - "Tuple giữ data cố định — dùng cho config, tọa độ, constant. Chọn đúng cấu trúc = code ít bug hơn."
