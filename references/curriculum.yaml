  - id: 20
    title: For-Else & Nested Loops
    objective: Hiểu for-else và nested loops ở mức thực dụng.
    explanation: '`for-else` trong Python ít người dùng nhưng rất hợp cho bài toán “tìm thấy thì break, không thấy thì else”. Nested loops thì cần khi xử lý bảng, ma trận, hoặc mọi cặp kết hợp. Bài này không nhằm làm learner code phức tạp hơn, mà để thấy đúng pattern cho đúng bài toán.'
    examples:
    - "items = ['a', 'b', 'c']\ntarget = 'd'\nfor item in items:\n    if item == target:\n        print('Found')\n        break\nelse:\n    print('Not found')"
    - "for row in range(2):\n    for col in range(3):\n        print(row, col)"
    exercise: Viết chương trình tìm một sản phẩm trong list bằng for-else; nếu không thấy thì in thông báo. Sau đó in bảng cửu chương 2x3 bằng nested loops.
    hints:
