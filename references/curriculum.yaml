  - id: 37
    title: File Encoding & Error Handling
    objective: "Xử lý encoding UTF-8/BOM, try/except cơ bản cho file operations."
    explanation: "File tiếng Việt hay bị lỗi encoding. File từ Excel save CSV thường có BOM. Bài này dạy cách xử lý những vấn đề thực tế khi đọc file từ khách hàng — không phải lý thuyết encoding mà là \"làm sao để script không crash khi nhận file lạ\"."
    examples:
    - "try:\n    with open('data.txt', 'r', encoding='utf-8') as f:\n        content = f.read()\nexcept FileNotFoundError:\n    print('File khong ton tai')\nexcept UnicodeDecodeError:\n    print('Loi encoding, thu utf-8-sig')"
    - "with open('data.csv', 'r', encoding='utf-8-sig') as f:\n    content = f.read()\nprint(content[:100])"
    - "import os\nif os.path.exists('input.txt'):\n    print('File ton tai')\nelse:\n    print('Khong tim thay file')"
    exercise: "Viết script đọc file CSV tiếng Việt, xử lý cả trường hợp file không tồn tại và lỗi encoding. In 5 dòng đầu nếu thành công, in thông báo lỗi rõ ràng nếu fail."
    hints:
    - utf-8-sig xử lý BOM.
    - try/except bắt lỗi cụ thể trước khi bắt Exception chung.
    sources:
    - tier: 1
      title: Python Tutorial - Errors and Exceptions
      url: https://docs.python.org/3/tutorial/errors.html
    - tier: 2
      title: Real Python - Python Exceptions
      url: https://realpython.com/python-exceptions/
