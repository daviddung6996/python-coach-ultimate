      input_sample: "SP001:Chuot:350000:3\nSP002:Ban_phim:850000:12\nSP003:Tai_nghe:1200000:2\nSP004:Loa:450000:8"
      expected_output: "TRA CỨU SP001: Chuot - 350,000 VND - Còn 3\n\nSẮP HẾT HÀNG (stock<5):\n- SP001: Chuot (3)\n- SP003: Tai_nghe (2)"
      deliverable: "inventory_lookup.py"
      delivery_package: ["inventory_lookup.py", "inventory.txt", "README.md"]
      market_note: "Tra cứu tồn kho = task phổ biến cho shop, kế toán kho, giá 500k-800k."
