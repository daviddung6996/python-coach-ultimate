    - Xử lý JSON trả về từ API.
    best_practices:
    - Chọn key nhất quán, dễ đọc.
    - Kiểm tra key trước khi truy cập nếu chưa chắc.
    - Tách dict cấu hình khỏi logic xử lý.
    project_applications:
    - User profile manager.
    - Simple config dictionary tool.
    monetization:
    - "Dict = JSON, API response, config, hồ sơ user. Hiểu dict = mở cửa automation và API integration — Level 2 đang tới."
