  - id: 19
    title: Break, Continue, Pass
    objective: Biết khi nào dùng break, continue, pass để kiểm soát vòng lặp.
    explanation: Ba từ khóa này nhìn nhỏ nhưng cực thực dụng. `break` dừng vòng lặp ngay; `continue` bỏ qua lượt hiện tại; `pass` giữ chỗ khi chưa viết gì. Nếu không hiểu rõ ba thứ này, learner sẽ viết loop hoặc quá vụng hoặc quá dài. Điểm quan trọng là dùng đúng chỗ và có lý do rõ ràng.
    examples:
    - "for n in [1, 2, 0, 3]:\n    if n == 0:\n        break\n    print(n)"
    - "for n in [1, -2, 3]:\n    if n < 0:\n        continue\n    print(n)"
    - "for item in []:\n    pass"
    exercise: 'Duyệt danh sách số: bỏ qua số âm, dừng khi gặp số 0, in các số dương trước đó.'
    hints:
    - break là stop hẳn.
    - continue là skip lượt hiện tại rồi lặp tiếp.
    sources:
    - tier: 1
      title: Python Tutorial - break and continue
      url: https://docs.python.org/3/tutorial/controlflow.html#break-and-continue-statements-and-else-clauses-on-loops
