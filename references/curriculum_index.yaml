    title: Python Data Types
    objective: Phân biệt các kiểu dữ liệu cơ bản trong Python và biết khi nào nên
      dùng từng kiểu.
    duration_minutes: 20
- id: 2
  title: Python Strings
  description: 'Làm chủ chuỗi: tạo chuỗi, truy cập ký tự, cắt chuỗi, tìm kiếm, validate,
