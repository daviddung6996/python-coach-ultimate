  - id: 1
    title: What Is Python & How It Works
    objective: Hiểu Python là gì, interpreter chạy code ra sao, và vì sao Python mạnh
      ở automation, web, data, AI.
    duration_minutes: 20
  - id: 2
    title: Installing Python
    objective: Cài Python đúng cách, kiểm tra phiên bản, chạy file .py trong terminal
      hoặc VS Code.
    duration_minutes: 15
  - id: 3
    title: Comments & print()
    objective: Biết dùng comment để ghi chú và dùng print() để xuất dữ liệu ra màn
      hình.
    duration_minutes: 20
  - id: 4
    title: Variables
    objective: Tạo biến, gán lại giá trị, đặt tên biến đúng chuẩn, và hiểu biến chỉ
      là nhãn trỏ tới dữ liệu.
    duration_minutes: 20
  - id: 5
    title: User input()
    objective: Lấy dữ liệu từ người dùng bằng input() và chuyển kiểu đúng để dùng
      tiếp.
